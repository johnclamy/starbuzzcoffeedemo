{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <title>{{ title }}</title>
    {% tailwind_css %}
</head>
<body class="min-h-screen bg-[#F1FAEE] dark:bg-[#1D3557] dark:text-white">
    <!-- Header -->
    <header class="bg-[#457B9D] text-white sticky top-0 z-10">
        <div class="max-w-5xl mx-auto p-4 flex justify-between items-center">
            <h1 class="text-3xl font-medium">
                <a href="{% url 'core.index' %}">
                    <span class="text-red-300">Pets</span>-<span class="text-blue-300">R</span>-<span class="text-green-300">Us</span>
                </a>
            </h1>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2023 Pets-R-Us!. All rights reserved.</p>
    </footer>
</body>
</html>
